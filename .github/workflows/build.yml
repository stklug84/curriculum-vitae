name: Build CV

on:
  pull_request:
  workflow_dispatch:
    inputs:
      engine:
        description: "LaTeX toolchain to use"
        required: true
        default: "pdflatex"
        type: choice
        options:
          - pdflatex
          - latex-chain
      local:
        description: "Set to 'true' when running locally via gh act (skips artifact upload, writes outputs to ./out)"
        required: false
        default: "false"
        type: string

# Least-privilege token: this workflow only reads the repo and uploads artifacts.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid PR pushes) to save runner minutes.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Default engine when not triggered via workflow_dispatch.
  # Override here or via the workflow_dispatch input above.
  DEFAULT_ENGINE: pdflatex
  # Main document basename (without .tex). Discovered automatically if empty.
  MAIN_TEX: ""

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: texlive/texlive:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve inputs
        id: cfg
        shell: bash
        env:
          # Use the modern `inputs.*` accessor (canonical for workflow_dispatch).
          # For non-dispatch events these are empty strings, and we fall back to
          # env defaults / the ACT auto-detect below.
          ENGINE_IN: ${{ inputs.engine }}
          LOCAL_IN: ${{ inputs.local }}
        run: |
          set -euo pipefail
          ENGINE="${ENGINE_IN:-$DEFAULT_ENGINE}"
          # Detect `nektos/act` automatically via the ACT=true env it exports.
          LOCAL="${LOCAL_IN:-${ACT:+true}}"
          LOCAL="${LOCAL:-false}"
          echo "engine=$ENGINE" >> "$GITHUB_OUTPUT"
          echo "local=$LOCAL"   >> "$GITHUB_OUTPUT"
          echo "Resolved engine=$ENGINE local=$LOCAL (ACT=${ACT:-unset})"

      - name: Detect main LaTeX document
        id: detect_main
        shell: bash
        run: |
          set -euo pipefail
          MAIN="${MAIN_TEX:-}"
          if [ -z "$MAIN" ]; then
            # Find a .tex file containing \documentclass at repo root.
            MAIN_FILE="$(grep -l '^\s*\\documentclass' ./*.tex 2>/dev/null | head -n1 || true)"
            if [ -z "$MAIN_FILE" ]; then
              echo "::error::No main .tex file (containing \\documentclass) found in repo root."
              exit 1
            fi
            MAIN="$(basename "$MAIN_FILE" .tex)"
          fi
          echo "main=$MAIN" >> "$GITHUB_OUTPUT"
          echo "Main document: ${MAIN}.tex"

      - name: Detect auxiliary inputs (bib / idx / psfrag)
        id: detect_aux
        shell: bash
        run: |
          set -euo pipefail
          MAIN="${{ steps.detect_main.outputs.main }}"
          TEX="${MAIN}.tex"

          HAS_BIB="false"
          HAS_BIBLATEX="false"
          HAS_INDEX="false"
          HAS_GLOSSARIES="false"
          HAS_PSFRAG="false"

          # Bibliography: BibTeX (\bibliography{...}) vs biblatex/biber.
          if grep -Eq '\\bibliography\{' "$TEX"; then
            HAS_BIB="true"
          fi
          if grep -Eq '\\usepackage(\[[^]]*\])?\{biblatex\}' "$TEX"; then
            HAS_BIBLATEX="true"
          fi

          # Index (makeindex).
          if grep -Eq '\\makeindex|\\printindex|\\usepackage(\[[^]]*\])?\{makeidx\}|\\usepackage(\[[^]]*\])?\{imakeidx\}' "$TEX"; then
            HAS_INDEX="true"
          fi

          # Glossaries (makeglossaries).
          if grep -Eq '\\usepackage(\[[^]]*\])?\{glossaries\}|\\makeglossaries' "$TEX"; then
            HAS_GLOSSARIES="true"
          fi

          # psfrag: only relevant for the latex->dvips->ps2pdf chain.
          if grep -Eq '\\usepackage(\[[^]]*\])?\{psfrag\}|\\psfrag\{' "$TEX"; then
            HAS_PSFRAG="true"
          fi

          # If any *.bib file is present alongside (root or nested), treat bibliography as needed.
          # Note: bash's `**` requires `shopt -s globstar`, so we use `find` for the recursive check.
          if compgen -G "*.bib" > /dev/null \
             || [ -n "$(find . -maxdepth 3 -name '*.bib' -print -quit)" ]; then
            HAS_BIB_FILES="true"
          else
            HAS_BIB_FILES="false"
          fi

          {
            echo "has_bib=$HAS_BIB"
            echo "has_biblatex=$HAS_BIBLATEX"
            echo "has_index=$HAS_INDEX"
            echo "has_glossaries=$HAS_GLOSSARIES"
            echo "has_psfrag=$HAS_PSFRAG"
            echo "has_bib_files=$HAS_BIB_FILES"
          } >> "$GITHUB_OUTPUT"

          echo "Detected:"
          echo "  bibtex     : $HAS_BIB"
          echo "  biblatex   : $HAS_BIBLATEX"
          echo "  index      : $HAS_INDEX"
          echo "  glossaries : $HAS_GLOSSARIES"
          echo "  psfrag     : $HAS_PSFRAG"
          echo "  *.bib found: $HAS_BIB_FILES"

      - name: Build with pdflatex chain
        if: steps.cfg.outputs.engine == 'pdflatex'
        shell: bash
        env:
          MAIN: ${{ steps.detect_main.outputs.main }}
          HAS_BIB: ${{ steps.detect_aux.outputs.has_bib }}
          HAS_BIBLATEX: ${{ steps.detect_aux.outputs.has_biblatex }}
          HAS_INDEX: ${{ steps.detect_aux.outputs.has_index }}
          HAS_GLOSSARIES: ${{ steps.detect_aux.outputs.has_glossaries }}
          HAS_PSFRAG: ${{ steps.detect_aux.outputs.has_psfrag }}
        run: |
          set -euo pipefail

          if [ "$HAS_PSFRAG" = "true" ]; then
            echo "::error::psfrag detected. pdflatex cannot perform psfrag substitutions."
            echo "::error::Re-run the workflow with engine=latex-chain (latex -> dvips -> ps2pdf)."
            exit 1
          fi

          # Pass 1
          pdflatex -interaction=nonstopmode -halt-on-error "$MAIN.tex"

          # Bibliography: tolerate "no citations" warnings (exit 1) but fail on real errors (>=2).
          if [ "$HAS_BIBLATEX" = "true" ]; then
            biber "$MAIN" || { rc=$?; [ "$rc" -ge 2 ] && exit "$rc"; }
          elif [ "$HAS_BIB" = "true" ]; then
            bibtex "$MAIN" || { rc=$?; [ "$rc" -ge 2 ] && exit "$rc"; }
          fi

          # Index
          if [ "$HAS_INDEX" = "true" ] && [ -f "$MAIN.idx" ]; then
            makeindex "$MAIN.idx"
          fi

          # Glossaries: tolerate missing glossary files but surface real failures.
          if [ "$HAS_GLOSSARIES" = "true" ]; then
            makeglossaries "$MAIN" || { rc=$?; [ "$rc" -ge 2 ] && exit "$rc"; }
          fi

          # Pass 2 + 3 to resolve refs/TOC/index/bib.
          pdflatex -interaction=nonstopmode -halt-on-error "$MAIN.tex"
          pdflatex -interaction=nonstopmode -halt-on-error "$MAIN.tex"

      - name: Build with latex -> dvips -> ps2pdf chain
        if: steps.cfg.outputs.engine == 'latex-chain'
        shell: bash
        env:
          MAIN: ${{ steps.detect_main.outputs.main }}
          HAS_BIB: ${{ steps.detect_aux.outputs.has_bib }}
          HAS_BIBLATEX: ${{ steps.detect_aux.outputs.has_biblatex }}
          HAS_INDEX: ${{ steps.detect_aux.outputs.has_index }}
          HAS_GLOSSARIES: ${{ steps.detect_aux.outputs.has_glossaries }}
          HAS_PSFRAG: ${{ steps.detect_aux.outputs.has_psfrag }}
        run: |
          set -euo pipefail

          if [ "$HAS_BIBLATEX" = "true" ]; then
            echo "::warning::biblatex detected; using biber. Ensure backend=biber in your preamble."
          fi

          # Pass 1 (DVI output)
          latex -interaction=nonstopmode -halt-on-error "$MAIN.tex"

          # Bibliography: tolerate "no citations" warnings (exit 1) but fail on real errors (>=2).
          if [ "$HAS_BIBLATEX" = "true" ]; then
            biber "$MAIN" || { rc=$?; [ "$rc" -ge 2 ] && exit "$rc"; }
          elif [ "$HAS_BIB" = "true" ]; then
            bibtex "$MAIN" || { rc=$?; [ "$rc" -ge 2 ] && exit "$rc"; }
          fi

          # Index
          if [ "$HAS_INDEX" = "true" ] && [ -f "$MAIN.idx" ]; then
            makeindex "$MAIN.idx"
          fi

          # Glossaries: tolerate missing glossary files but surface real failures.
          if [ "$HAS_GLOSSARIES" = "true" ]; then
            makeglossaries "$MAIN" || { rc=$?; [ "$rc" -ge 2 ] && exit "$rc"; }
          fi

          # Pass 2 + 3 to resolve refs.
          latex -interaction=nonstopmode -halt-on-error "$MAIN.tex"
          latex -interaction=nonstopmode -halt-on-error "$MAIN.tex"

          # DVI -> PS (psfrag substitutions are applied here).
          dvips -Ppdf -G0 -o "$MAIN.ps" "$MAIN.dvi"

          # PS -> PDF
          ps2pdf -dPDFSETTINGS=/prepress "$MAIN.ps" "$MAIN.pdf"

          if [ "$HAS_PSFRAG" = "true" ]; then
            echo "psfrag substitutions were processed by dvips."
          fi

      - name: Verify PDF
        shell: bash
        env:
          MAIN: ${{ steps.detect_main.outputs.main }}
        run: |
          set -euo pipefail
          if [ ! -s "$MAIN.pdf" ]; then
            echo "::error::Expected $MAIN.pdf was not produced or is empty."
            exit 1
          fi
          ls -la "$MAIN.pdf"

      # ---------- Remote (GitHub-hosted) artifact upload ----------
      - name: Upload PDF artifact (remote)
        if: steps.cfg.outputs.local != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.detect_main.outputs.main }}
          path: ${{ steps.detect_main.outputs.main }}.pdf
          if-no-files-found: error

      - name: Upload build logs on failure (remote)
        if: failure() && steps.cfg.outputs.local != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: build-logs
          path: |
            *.log
            *.blg
            *.ilg
          if-no-files-found: ignore

      # ---------- Local (gh act) output ----------
      # The PDF is built in the step CWD. Under `act --bind`, the host repo
      # directory is bind-mounted into the container; writing relative to CWD
      # (the same place pdflatex wrote the PDF) guarantees the file lands on
      # the host. The container runs as root, so we restore ownership to the
      # host user by chowning to whoever owns existing source files (e.g. the
      # checked-out .tex), since that reflects the host UID/GID through the
      # bind mount.
      # - name: Copy PDF to workspace ./out (local)
      #   if: steps.cfg.outputs.local == 'true'
      #   shell: bash
      #   env:
      #     MAIN: ${{ steps.detect_main.outputs.main }}
      #   run: |
      #     set -euo pipefail
      #     mkdir -p ./out
      #     cp -f "$MAIN.pdf" "./out/$MAIN.pdf"
      #     # Restore host ownership: the container runs as root, but under `act --bind`
      #     # the host repo is bind-mounted. Chown to whoever owns the source .tex
      #     # (which reflects the host UID/GID through the bind mount).
      #     REF_OWNER="$(stat -c '%u:%g' "$MAIN.tex")"
      #     chown -R "$REF_OWNER" ./out
      #     echo "Wrote ./out/$MAIN.pdf (owner $REF_OWNER)"

      # - name: Copy build logs to workspace ./out (local, on failure)
      #   if: failure() && steps.cfg.outputs.local == 'true'
      #   shell: bash
      #   run: |
      #     set -euo pipefail
      #     mkdir -p ./out/logs
      #     # Use shopt+nullglob so missing files don't break the copy.
      #     shopt -s nullglob
      #     logs=( *.log *.blg *.ilg )
