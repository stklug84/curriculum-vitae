  summary:
    de: >-
      Promovierter Physiker mit langjähriger Erfahrung im Aufbau
      hybrider AI-Plattform-Architekturen im industriellen Umfeld.
      Schwerpunkte: Cloud-native Daten- und ML-Systeme, semantische
      Datenanalyse, Industrialisierung produktiver Analytics-Lösungen.
    en: >-
      PhD physicist who designs, builds and delivers distributed data and
      analytics platforms on Apache Spark (Scala/Python) and cloud-native
      data and ML systems (Azure primary, AWS/GCP aware). Brings MLOps and
      CI/CD discipline to productionise analytics at scale, and partners
      directly with cross-functional teams across Europe, North America and
      Asia to deliver and advise. Adjacent strengths in GenAI, semantic data,
      explainable AI and knowledge graphs.

