  lang_default: de
  title:
    de: IT-Systemarchitekt
    en: Data & AI Solutions Architect
  location:
    de: Deutschland
    en: Germany
  summary:
    de: >-
      Promovierter Physiker, der mit Begeisterung produktionsreife verteilte
      Daten- und Analyseplattformen auf Basis von Apache Spark/Kafka/Flink
      (PySpark, Scala, Python) sowie cloud-native AI/ML-Systeme (primär Azure,
      AWS/GCP vertraut) konzipiert, aufbaut und liefert. Agiert als
      vertrauenswürdiger technischer Berater für funktionsübergreifende Teams in
      Europa, Nordamerika und Asien und bringt MLOps- und CI/CD-Disziplin ein,
      um Analytics-Lösungen im großen Maßstab zu industrialisieren. Praktische
      Stärken in GenAI — RAG, Multi-Agenten-Systeme und Evaluation — ergänzt
      durch semantische Daten, erklärbare KI und Knowledge Graphs, um agentische
      Lösungen mit messbarem geschäftlichem Mehrwert auszuliefern.
    en: >-
      PhD physicist who loves to design, build and deliver production-grade
      distributed data and analytics platforms on Apache Spark/Kafka/Flink
      (PySpark, Scala, Python) and cloud-native AI/ML systems (Azure primary,
      AWS/GCP aware). Acts as a trusted technical advisor to cross-functional
      teams across Europe, North America and Asia, bringing MLOps and CI/CD
      discipline to productionise analytics at scale. Hands-on strengths in
      GenAI — RAG, multi-agent systems and evaluation — alongside semantic data,
      explainable AI and knowledge graphs, to ship agentic solutions that
      deliver measurable business value.

