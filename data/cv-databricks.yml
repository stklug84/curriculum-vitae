  summary:
    de: >-
      Promovierter Physiker mit langjähriger Erfahrung im Aufbau
      hybrider AI-Plattform-Architekturen im industriellen Umfeld.
      Schwerpunkte: Cloud-native Daten- und ML-Systeme, semantische
      Datenanalyse, Industrialisierung produktiver Analytics-Lösungen.
    en: >-
      PhD physicist that loves to design, build and deliver distributed data and
      analytics platforms based on Apache Spark/Kafka/Flink (in Scala/Python)
      and cloud-native data and AI/ML systems (Azure primary, AWS/GCP aware).
      Brings MLOps and CI/CD discipline to productionise analytics at scale,
      and partners directly with cross-functional teams across Europe, North America
      and Asia to deliver support and advise. Adjacent strengths in GenAI,
      semantic data, explainable AI and knowledge graphs to implement agentic
      solutions to provide insights and business benefits.

