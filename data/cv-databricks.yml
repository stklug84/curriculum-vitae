    summary:
      de: >-
        Konzeption und Einführung einer durchgängigen Daten- &
        AI-Plattformarchitektur auf Basis des Databricks Lakehouse über hybride
        und öffentliche Cloud hinweg; als vertrauenswürdiger technischer Berater
        für funktionsübergreifende Teams tätig und Lieferung produktionsreifer
        Data-Engineering- und Analytics-Lösungen im großen Maßstab im
        industriellen und fertigungsnahen Umfeld. Lösungsarchitekt für die
        folgenden 〈N — confirm〉 integrierten Produktivlösungen:
      en: >-
        Designed and introduced an end-to-end Data & AI platform architecture
        on the Databricks Lakehouse across hybrid and public cloud, serving as
        trusted technical advisor to cross-functional teams and delivering
        production-grade data engineering and analytics at scale in an
        industrial and manufacturing context. Solution architect across
        〈N — confirm〉 integrated production solutions:
    bullets:
      # MAIde/MAOAM
      - de: >-
          Konzeption einer rich-code Multi-Agenten-Orchestrierungsplattform
          (LangGraph, Google ADK), die autonome, dynamische agentische Systeme
          ermöglicht, welche ihre Topologie an die jeweilige CAE-Aufgabe
          anpassen — Optimierung von Layout, Geometrie und Design automotiver
          ECU-Komponenten — und so die Designqualität steigert sowie die
          Layout-Durchlaufzeit um 〈−XX% — confirm〉 reduziert.
        en: >-
          Architected a rich-code multi-agent orchestration platform (LangGraph,
          Google ADK) enabling autonomous, dynamic agentic systems that adapt
          their topology to the CAE task — optimising layout, geometry and
          design of automotive ECU components — improving design quality and
          cutting layout cycle time by 〈−XX% — confirm〉.
      # NOVA Platform
      - de: >-
          Lieferung eines modernen AI- und datengetriebenen Systems, das
          semantische Daten (erklärbare/interpretierbare KI und Knowledge
          Graphs) über durchgängige Engineering-Prozesse nutzt; eine
          Self-Service-Schnittstelle demokratisierte den Wissensaustausch für
          〈N Teams/Nutzer — confirm〉 Produkt- und Domänenteams und beschleunigte
          die Prozessverbesserung.
        en: >-
          Delivered a modern AI- and data-driven system leveraging semantic
          data (explainable/interpretable AI and knowledge graphs) across
          end-to-end engineering processes, with a self-service interface that
          democratised knowledge sharing for 〈N teams/users — confirm〉 product
          and domain teams and accelerated process improvement.
      # Virtual Load Platform
      - de: >-
          Aufbau eines Hybrid-Cloud-Infrastruktur-Frameworks zur Ausführung
          virtueller Lastsimulationen von ECU-Designs auf On-Premise-HPC, mit
          einer KI-optimierten Laufzeitumgebung, die Lastspitzen nahtlos auf
          Cloud-HPC-Knoten auslagert — Steigerung des Simulationsdurchsatzes um
          〈+XX% — confirm〉 bei gleichzeitiger Kontrolle der Compute-Kosten.
        en: >-
          Built a hybrid-cloud infrastructure framework running virtual load
          simulations of ECU designs on on-site HPC, with an AI-optimised
          runtime that seamlessly bursts demand spikes to cloud HPC nodes —
          increasing simulation throughput by 〈+XX% — confirm〉 while controlling
          compute cost.
      # Endurance Test Cloud (Testing Alliance Infrastructure)
      - de: >-
          Entwurf einer ereignisbasierten Streaming-Datenpipeline nahezu in
          Echtzeit (Kafka, Flink, Delta Lake), die Testingenieuren Zugriff auf
          langlaufende Umwelt-Testdaten verschafft und Frühwarn- sowie
          Anomalieerkennungssysteme speist, welche die Zeit bis zur Erkennung
          um 〈−XX% — confirm〉 verkürzten.
        en: >-
          Designed an event-based, near-real-time streaming data pipeline
          (Kafka, Flink, Delta Lake) giving test engineers access to
          long-running environmental test data, powering early-warning and
          anomaly-detection systems that reduced time-to-detection by
          〈−XX% — confirm〉.


  - id: bosch-eng-data
