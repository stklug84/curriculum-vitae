  - id: bosch-eng-ai
    targets: [latex, web]
    period:
      de: seit 01/2024
      en: since 01/2024
    year: 2024
    role:
      de: Cloud-, Daten- und KI-Lösungsarchitekt
      en: Cloud, Data & AI Solutions Architect
    org: Robert Bosch GmbH
    location:
      de: Schwieberdingen
      en: Schwieberdingen, Germany
    kind: work
    monogram: RB
    bg: /assets/img/cv/bg/topology.svg
    tags:
      - Azure
      - Confluent Cloud
      - Databricks
      - Delta Lake
      - Flink
      - Google ADK
      - Kafka
      - Kubernetes
      - LakeFS
      - LangGraph
      - mlflow
      - OpenLineage
      - Spark
    summary:
      de: >-
        Konzeption und Einführung einer durchgängigen Daten- &
        AI-Plattformarchitektur auf Basis des Databricks Lakehouse über hybride
        und öffentliche Cloud hinweg; als vertrauenswürdiger technischer Berater
        für funktionsübergreifende Teams tätig und Lieferung produktionsreifer
        Data-Engineering- und Analytics-Lösungen im großen Maßstab im
        industriellen und fertigungsnahen Umfeld. Lösungsarchitekt für die
        folgenden 4+ integrierten Produktivlösungen:
      en: >-
        Designed and introduced an end-to-end Data & AI platform architecture
        on the Databricks Lakehouse across hybrid and public cloud, serving as
        trusted technical advisor to cross-functional teams and delivering
        production-grade data engineering and analytics at scale in an
        industrial and manufacturing context. Solution architect across
        4+ integrated production solutions:
    bullets:
      # MAIde/MAOAM
      - de: >-
          Konzeption einer rich-code Multi-Agenten-Orchestrierungsplattform
          (LangGraph, Google ADK), die die Designqualität steigert und die
          Layout-Durchlaufzeit um 26% reduziert, indem autonome, dynamische
          agentische Systeme bereitgestellt werden, welche ihre Topologie an die
          jeweilige CAE-Aufgabe anpassen — Optimierung von Layout, Geometrie und
          Design automotiver ECU-Komponenten — und Ingenieure von repetitiven
          Aufgaben entlasten.
        en: >-
          Architected a rich-code multi-agent orchestration platform (LangGraph,
          Google ADK) improving design quality and cutting layout cycle time by
          26% through deploying autonomous, dynamic agentic systems that adapt
          their topology to a particular CAE task — optimising layout, geometry and
          design of automotive ECU components — freeing engineers from repetitive
          tasks.
      # NOVA Platform
      - de: >-
          Lieferung eines modernen AI- und datengetriebenen Systems, das
          semantische Daten (erklärbare/interpretierbare KI und Knowledge
          Graphs) über durchgängige Engineering-Prozesse nutzt; eine
          Self-Service-Schnittstelle demokratisierte den Wissensaustausch für
          10+ Produkt- und Domänenteams durch beschleunigte Prozessverbesserung.
        en: >-
          Delivered a modern AI- and data-driven system leveraging semantic
          data (explainable/interpretable AI and knowledge graphs) across
          end-to-end engineering processes, with a self-service interface that
          democratised knowledge sharing for 10+ product and domain teams via
          accelerated process improvement.
      # Virtual Load Platform
      - de: >-
          Architektur und Prototyping eines Hybrid-Cloud-Infrastruktur-Frameworks
          zur Ausführung virtueller Lastsimulationen von ECU-Designs auf
          On-Premise-HPC-Systemen, mit einer KI-optimierten Laufzeitumgebung, die
          Lastspitzen nahtlos auf Cloud-HPC-Knoten auslagert — Steigerung des
          Simulationsdurchsatzes um den Faktor 5x für kleinere Jobs bei
          gleichzeitiger Kontrolle der Compute-Kosten.
        en: >-
          Architecting and prototyping a hybrid-cloud infrastructure framework
          running virtual load simulations of ECU designs on on-site HPC systems,
          with an AI-optimised runtime that seamlessly bursts demand spikes to
          cloud HPC nodes — increasing simulation throughput by a factor of 5x for
          smaller jobs while controlling compute cost.
      # Endurance Test Cloud (Testing Alliance Infrastructure)
      - de: >-
          Entwurf einer ereignisbasierten Streaming-Datenpipeline nahezu in
          Echtzeit (Kafka, Flink, Delta Lake), die Testingenieuren nahezu in
          Echtzeit Zugriff auf langlaufende Umwelt-Testdaten verschafft und
          Frühwarn- sowie Anomalieerkennungssysteme speist, welche die Zeit bis
          zur Erkennung um bis zu 2+ Wochen verkürzten und potenziell über
          1 Mio. € pro Labor einsparen.
        en: >-
          Designed an event-based, near-real-time streaming data pipeline
          (Kafka, Flink, Delta Lake) giving test engineers near real-time access
          to long-running environmental test data, powering early-warning and
          anomaly-detection systems that reduced time-to-detection by up to 2+
          weeks, potentially saving over €1M per lab.

  - id: bosch-eng-data
    targets: [latex, web]
    period:
