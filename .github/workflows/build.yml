name: Build Document

on:
  pull_request:
  workflow_dispatch:
    inputs:
      local:
        description: "Set to 'true' when running locally via gh act (skips artifact upload)"
        required: false
        default: "false"
        type: string

# Least-privilege token: the called workflow only reads the repo and uploads
# artifacts.
permissions:
  contents: read

# Cancel outdated runs on the same ref.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # All build logic (variant discovery, matrix build, packaging) lives in
  # the central latex-build-cv reusable workflow. The TeX Live container
  # image is still resolved from this repo's digest-pinned
  # .github/docker/texlive/Dockerfile (kept current by Dependabot).
  build:
    uses: stklug84/github-workflows/.github/workflows/latex-build-cv.yml@4558e620091a7317d90c9cb11ff6b7daabf6ef6d  # v1.3.0
    with:
      # Resolve repo-root shared assets (personal-info.tex, styles/*.sty,
      # images/) from inside cvs/<name>/.
      texinputs: ".:../..:../../styles:../../images:"
      local: ${{ inputs.local }}
