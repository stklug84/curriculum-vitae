---
# title: Build Document workflow
# authors:
#   - Steffen Klug <45033201+stklug84@users.noreply.github.com>
# date: 2026-06-22
# keywords: [infrastructure, latex, ci]
# comment: |
#   Builds the CV on pull requests and pushes to main:
#     - generate : render per-section .tex files for every variant from
#                  the single source of truth (data/cv.yml) via the
#                  cv/parse composite action, uploaded as one artifact.
#     - build    : delegate to the central latex-build-cv reusable
#                  workflow (variant discovery, matrix build, packaging
#                  and versioned release on pushes to main). The TeX Live
#                  image is resolved from the digest-pinned Dockerfile.
# ---
name: Build Document

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      local:
        description: "Set to 'true' when running locally via gh act (skips artifact upload)"
        required: false
        default: "false"
        type: string

# Least-privilege default; the calling job below grants contents: write,
# which the called workflow's release job needs to publish versioned
# releases on pushes to main.
permissions:
  contents: read

# Cancel outdated runs on the same ref.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Render the per-section .tex files for every variant from the single
  # source of truth (data/cv.yml) via the cv/parse composite action,
  # then upload them as one artifact laid out under cvs/<variant>/. The
  # reusable workflow downloads this artifact at repo root (prebuild),
  # so every file must already sit under its variant directory.
  generate:
    name: Generate section files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # plain style -> cvs/photo-2page/ (pdflatex variant). Emits
      # cv-*.tex + personal-info.tex for the plain longtable layout.
      - name: Generate plain (photo-2page)
        uses: stklug84/actions/cv/parse@cb91fdcefccd47f24449549389216a5981a6455c  # v2.2.1
        with:
          source: data/cv.yml
          mode: latex
          style: plain
          lang: de
          out-dir: cvs/photo-2page

      # sidebar style -> cvs/sidebar/ (xelatex variant). Emits
      # cv-*.tex + personal-info.tex using \cventry/\cvskillgroup/... .
      - name: Generate sidebar
        uses: stklug84/actions/cv/parse@cb91fdcefccd47f24449549389216a5981a6455c  # v2.2.1
        with:
          source: data/cv.yml
          mode: latex
          style: sidebar
          lang: de
          out-dir: cvs/sidebar

      - name: Upload generated section files
        uses: actions/upload-artifact@v7
        with:
          name: cv-generated-tex
          path: cvs/**/*.tex
          if-no-files-found: error

  # All build logic (variant discovery, matrix build, packaging, release
  # publishing) lives in the central latex-build-cv reusable workflow.
  # The TeX Live container image is still resolved from this repo's
  # digest-pinned .github/docker/texlive/Dockerfile (kept current by
  # Dependabot). The reusable workflow downloads the generate job's
  # artifact at repo root (prebuild) before the TeX Live build, so the
  # freshly generated section files override the committed fallback.
  build:
    needs: generate
    # contents: write is consumed only by the called workflow's release
    # job (publishes versioned releases on pushes to main); all other
    # jobs read the repo and upload artifacts.
    permissions:
      contents: write
    # yamllint disable-line rule:line-length
    uses: stklug84/github-workflows/.github/workflows/latex-build-cv.yml@50a6d4b1ab8a8a817e552c1f53901661368673e5  # v1.7.0
    with:
      # Resolve repo-root shared assets (styles/*.sty, images/) from
      # inside cvs/<name>/.
      texinputs: ".:../..:../../styles:../../images:"
      local: ${{ inputs.local }}
      # Download the generate job's section files at repo root before
      # the build, so cvs/<variant>/{cv-*.tex,personal-info.tex} reflect
      # data/cv.yml rather than the committed fallback snapshot.
      prebuild-artifact: "cv-generated-tex"
      prebuild-into: "."
      # Publish the built PDFs as a versioned release (v<date>-r<run#>)
      # on every push to main; keep only the 10 newest releases.
      release: "true"
      release-keep: "10"
