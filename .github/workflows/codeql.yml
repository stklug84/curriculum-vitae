---
# title: CodeQL workflow
# authors:
#   - Steffen Klug <45033201+stklug84@users.noreply.github.com>
# date: 2026-06-11
# keywords: [infrastructure, security]
# comment: |
#   CodeQL code scanning for the `actions` language, which analyzes
#   .github/workflows/* (expression injection, excessive permissions,
#   untrusted checkout, artifact/cache poisoning, ...). The
#   security-extended suite adds the unpinned-tag query. Bash run:
#   blocks are not a CodeQL language and are covered by the embedded
#   shellcheck of actionlint in the Lint workflow instead.
# ---
name: CodeQL

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    # Weekly run to pick up newly released queries.
    - cron: '45 5 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (actions)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions
          build-mode: none
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:actions
