---
# title: Build Document workflow
# authors:
#   - Steffen Klug <45033201+stklug84@users.noreply.github.com>
# date: 2026-06-22
# keywords: [infrastructure, latex, ci]
# comment: |
#   Builds the CV on pull requests and pushes to main by delegating
#   entirely to the central latex-build-cv reusable workflow. With
#   generate: 'true' that workflow first expands the build matrix in
#   data/variants.yml into the variant tree (via the
#   stklug84/actions/cv/generate composite action), then discovers,
#   matrix-builds, packages and (on pushes to main) publishes a versioned
#   release. The TeX Live image is resolved from the repo's digest-pinned
#   Dockerfile. All generation and build logic lives in the reusable
#   workflow / composite actions; this caller is pure configuration.
# ---
name: Build Document

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      local:
        description: "Set to 'true' when running locally via gh act (skips artifact upload)"
        required: false
        default: "false"
        type: string
      generate-manifest:
        description: >-
          Build-matrix manifest fed to the generate job. Defaults to the
          committed data/variants.yml (the remote matrix). Local-only
          builds (e.g. `task cv:academics`) override this with a gitignored
          overlay such as data/variants.local.yml so PII-bearing sources
          are built locally without ever entering the committed matrix.
        required: false
        default: "data/variants.yml"
        type: string

# Least-privilege default; the calling job below grants contents: write,
# which the called workflow's release job needs to publish versioned
# releases on pushes to main.
permissions:
  contents: read

# Cancel outdated runs on the same ref.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The reusable workflow does everything: with generate: 'true' it first
  # expands the build matrix in data/variants.yml into the variant tree
  # (cvs/<yaml>-<lang>/<style>/sklug-cv.tex + .engine + cv/parse section
  # bodies) via the stklug84/actions/cv/generate composite action, then
  # discovers, matrix-builds, packages and releases. The TeX Live image
  # is resolved from this repo's digest-pinned
  # .github/docker/texlive/Dockerfile (kept current by Dependabot).
  #
  # The matrix lives entirely in data/variants.yml: adding or changing a
  # variant (any yaml x style x lang) needs no edit to this workflow.
  build:
    # contents: write is consumed only by the called workflow's release
    # job (publishes versioned releases on pushes to main); all other
    # jobs read the repo and upload artifacts. actions: read is required by
    # the called workflow's package/release jobs (v1.12.0+), which use
    # `gh run download` / the run-artifacts REST API to fetch each per-CV
    # PDF artifact by name; a caller must grant every permission the called
    # workflow's jobs request or the run fails at startup.
    permissions:
      contents: write
      actions: read
    # SHA-pinned to github-workflows v1.17.0: bundles stklug84/actions
    # v2.13.0 (cv/generate, texlive/*, incl. the cv/parse 'tagged' style
    # driving cv-tagged-ia per-item skill proficiency bars
    # (\cvskillgroupheading + \cvskillitembar from skills[].items
    # {name,size}), per-interest FontAwesome icons (\cvinterest{icon}{text}
    # from interests[].icon), concept bubbles and tech stacks, structured
    # certifications (code/name/issuer -> \cvcertlist/\cvcert code chips
    # aligned to the section heading), an optional meta.pdf_title backing the
    # PDF metadata title (absent -> "Lebenslauf"), \@-spacing auto-injected
    # into meta.author (no hand-written LaTeX in the YAML; pdf_author literal),
    # emitting meta.location/title/summary plus experience
    # bullets, the two-line name split and the conference location heatmap
    # (lat/lon -> \cvheatmap)) and gives every released PDF a
    # unique asset name (stklug-<yaml>-<lang>-<style>.pdf) so all built
    # variants appear in the release instead of colliding on the shared
    # sklug-cv.pdf leaf-main basename. v2.13.0 adds style-dependent schema
    # profiles: each source is validated and emitted against the profile of
    # the style it is built with -- this repo's cv-academics (cv-plain-style)
    # uses the plain profile (plain-string skills + certifications[].text)
    # and cv-databricks (cv-tagged-ia) uses the tagged profile ({name,size}
    # skills + structured certs + the tagged-only concepts/icon/lat-lon
    # fields), so each source validates against the exact shape it consumes.
    # The release/package jobs download artifacts per-name (one subdir each)
    # so a build producing a single PDF variant releases correctly instead of
    # failing the flatten step with "No PDFs found to release." v1.17.0
    # makes the release prune step also sweep orphan release tags
    # (v<YYYY.MM.DD>-r<N> tags with no matching release), so pruned releases
    # no longer leave their tags behind.
    # yamllint disable-line rule:line-length
    uses: stklug84/github-workflows/.github/workflows/latex-build-cv.yml@986b646115be694c7b7e5fffe3a28ae98be920fa  # v1.17.0
    with:
      # Render the full variant tree before building, straight from the
      # build matrix (defaults: templates/, data/).
      generate: "true"
      # Manifest driving the generate job. The workflow_dispatch input
      # defaults to data/variants.yml (the committed remote matrix); a
      # local gh act run can point this at a gitignored overlay to build
      # local-only, PII-bearing variants without committing them.
      generate-manifest: ${{ inputs.generate-manifest || 'data/variants.yml' }}
      # Resolve repo-root shared assets (styles/*.sty, images/) from
      # inside cvs/<yaml>-<lang>/<style>/ (three levels below the repo
      # root, hence ../../..).
      texinputs: ".:../../..:../../../styles:../../../images:"
      local: ${{ inputs.local }}
      # Publish the built PDFs as a versioned release (v<date>-r<run#>)
      # on every push to main; keep only the 10 newest releases.
      release: "true"
      release-keep: "10"
