# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
# Taskfile.yml — local CV builds via gh act + go-task.
#
# Three build targets, each running the build workflow under gh act:
#
#   build          The CI-equivalent build. Runs the workflow against the
#                  committed data/variants.yml unchanged — the generic,
#                  manifest-driven matrix build (whatever variants.yml
#                  currently declares). No overlay, nothing local-only.
#
#   cv:databricks  Builds ONLY language `en` across ALL non-plain styles.
#                  The matrix is derived dynamically from the `styles`
#                  registry in data/variants.yml (every style except
#                  cv-plain-style), emitted into a gitignored overlay
#                  (data/variants.local.yml). Self-contained: adding a new
#                  non-plain style to the registry extends this build with
#                  no edit here.
#
#   cv:academics   Builds ONLY the cv-plain-style + language `de` variant
#                  from the PII-bearing, gitignored data/cv-academics.yml.
#                  Like cv:databricks it writes its own matrix into the
#                  gitignored overlay data/variants.local.yml.
#
# Both cv:* targets generate the overlay deterministically: they copy the
# `styles`/`langs` registries from data/variants.yml, then append a fresh
# `cvs:` block with their own matrix. The overlay is ALWAYS removed
# afterwards (success, failure, or Ctrl-C). Nothing PII-related ever
# enters the git index: data/cv-academics.yml and data/variants.local.yml
# are both gitignored.
#
# Requires: go-task (https://taskfile.dev), gh + gh-act extension
# (https://github.com/nektos/gh-act), Docker.
version: "3"

vars:
  # act's default micro image lacks jq (needed by the discover job); the
  # medium runner image matches GitHub's hosted toolset.
  ACT_RUNNER: catthehacker/ubuntu:act-latest
  BUILD_WF: .github/workflows/build.yml
  LINT_WF: .github/workflows/lint.yml
  # Committed matrix / registry source. `build` uses it directly; the
  # cv:* targets copy its `styles`/`langs` registries into the overlay.
  VARIANTS_SRC: data/variants.yml
  # Gitignored overlay the cv:* targets generate and feed to the workflow.
  OVERLAY: data/variants.local.yml
  ACADEMICS_SRC: data/cv-academics.yml
  # The single plain style; cv:databricks excludes it from its matrix.
  PLAIN_STYLE: cv-plain-style
  # On Apple Silicon the TeX Live image is pulled as arm64; act defaults to
  # amd64 and Docker refuses the mismatched digest. Force arm64 there.
  ARCH_FLAG:
    sh: '[ "{{OS}}/{{ARCH}}" = "darwin/arm64" ] && echo "--container-architecture linux/arm64" || true'
  # GitHub's hosted ubuntu-latest ships PyYAML/Jinja2 preinstalled, so the
  # cv/generate action's on-demand `pip install --user` is skipped there.
  # The catthehacker act image lacks them AND its Python 3.12 is
  # PEP-668 externally-managed, which rejects that pip install. Allow it so
  # local act runs match hosted-runner behaviour.
  ACT_ENV: "--env PIP_BREAK_SYSTEM_PACKAGES=1"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  build:
    desc: Build the full committed matrix (data/variants.yml) via gh act
    cmds:
      # No generate-manifest override: the workflow defaults to
      # data/variants.yml — the generic, manifest-driven matrix build.
      - >-
        gh act workflow_dispatch -W {{.BUILD_WF}}
        --input local=true
        -P ubuntu-latest={{.ACT_RUNNER}}
        {{.ARCH_FLAG}} {{.ACT_ENV}}

  cv:databricks:
    desc: Build language en across all non-plain styles via gh act
    cmds:
      # The overlay is always removed afterwards (success, failure, Ctrl-C).
      - defer: rm -f {{.OVERLAY}}
      # Build the overlay: keep the registries from variants.yml, then
      # append a cv-databricks matrix of {style, lang: en} for every style
      # in the registry except the plain one.
      - |
        set -euo pipefail
        # Registries only: everything up to (but excluding) the `cvs:` line.
        sed '/^cvs:/,$d' {{.VARIANTS_SRC}} > {{.OVERLAY}}
        {
          echo 'cvs:'
          echo '  cv-databricks:'
          # Style registry keys are 2-space indented `  <style>: {...}`.
          sed -nE 's|^  ([A-Za-z0-9_-]+):[[:space:]]*\{.*|\1|p' {{.VARIANTS_SRC}} \
            | grep -vx '{{.PLAIN_STYLE}}' \
            | while IFS= read -r style; do
                echo "    - {style: ${style}, lang: en}"
              done
        } >> {{.OVERLAY}}
        if ! grep -qE '^    - \{style: .*, lang: en\}$' {{.OVERLAY}}; then
          echo "::error:: failed to build cv-databricks matrix in {{.OVERLAY}}" >&2
          exit 1
        fi
      # Run the build under gh act, pointing generation at the overlay.
      - >-
        gh act workflow_dispatch -W {{.BUILD_WF}}
        --input local=true
        --input generate-manifest={{.OVERLAY}}
        -P ubuntu-latest={{.ACT_RUNNER}}
        {{.ARCH_FLAG}} {{.ACT_ENV}}

  cv:academics:
    desc: Build the local-only, PII-bearing cv-academics variant (cv-plain-style, de) via gh act
    preconditions:
      - sh: 'test -f {{.ACADEMICS_SRC}}'
        msg: "{{.ACADEMICS_SRC}} not found (it is gitignored — provide it locally to build this variant)."
    cmds:
      # The overlay is always removed afterwards (success, failure, Ctrl-C).
      - defer: rm -f {{.OVERLAY}}
      # Build the overlay: keep the registries from variants.yml, then
      # append the single cv-academics leaf (cv-plain-style + de).
      - |
        set -euo pipefail
        # Registries only: everything up to (but excluding) the `cvs:` line.
        sed '/^cvs:/,$d' {{.VARIANTS_SRC}} > {{.OVERLAY}}
        {
          echo 'cvs:'
          echo '  cv-academics:'
          echo '    - {style: {{.PLAIN_STYLE}}, lang: de}'
        } >> {{.OVERLAY}}
        if ! grep -qE '^  cv-academics:' {{.OVERLAY}}; then
          echo "::error:: failed to build cv-academics matrix in {{.OVERLAY}}" >&2
          exit 1
        fi
      # Run the build under gh act, pointing generation at the overlay.
      - >-
        gh act workflow_dispatch -W {{.BUILD_WF}}
        --input local=true
        --input generate-manifest={{.OVERLAY}}
        -P ubuntu-latest={{.ACT_RUNNER}}
        {{.ARCH_FLAG}} {{.ACT_ENV}}

  lint:
    desc: Run the lint workflow locally via gh act
    cmds:
      - >-
        gh act workflow_dispatch -W {{.LINT_WF}}
        -P ubuntu-latest={{.ACT_RUNNER}}
        {{.ARCH_FLAG}} {{.ACT_ENV}}

  clean:
    desc: Remove the local-only overlay and generated variant tree
    cmds:
      - rm -f {{.OVERLAY}}
      - rm -rf cvs
