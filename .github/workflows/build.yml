name: Build Document

on:
  pull_request:
  workflow_dispatch:
    inputs:
      local:
        description: "Set to 'true' when running locally via gh act (skips artifact upload)"
        required: false
        default: "false"
        type: string

# Least-privilege token: this workflow only reads the repo and uploads artifacts.
permissions:
  contents: read

# Cancel outdated runs on the same ref.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Dynamic artifact-name prefix. Never hardcoded; derived from the
  # repository name so the workflow is fully portable.
  # Note: artifact names may not contain '/'. Repo names usually don't either.
  ARTIFACT_PREFIX: ${{ github.event.repository.name }}

jobs:
  # =====================================================================
  #  discover
  #
  #  Auto-discovers every CV variant under cvs/*/.
  #  Each variant directory must contain exactly one *.tex with
  #  \documentclass, and may contain a sibling `.engine` dotfile naming
  #  the engine to use (latexmk | pdflatex | xelatex | latex-chain).
  #  If `.engine` is missing, the default is latexmk.
  #
  #  Per main, the script also detects auxiliary toolchain requirements
  #  (bibtex/biblatex, makeindex, glossaries, psfrag).
  #
  #  Emits a JSON matrix consumed by the `build` job. No filenames are
  #  hardcoded in this workflow.
  # =====================================================================
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
      local:  ${{ steps.cfg.outputs.local }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve local mode
        id: cfg
        shell: bash
        env:
          LOCAL_IN: ${{ inputs.local }}
        run: |
          set -euo pipefail
          # nektos/act exports ACT=true; treat that as implicit local mode.
          LOCAL="${LOCAL_IN:-${ACT:+true}}"
          LOCAL="${LOCAL:-false}"
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "Resolved local=$LOCAL (ACT=${ACT:-unset})"

      - name: Scan cvs/*/ and build matrix
        id: scan
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d cvs ] || [ -z "$(ls -A cvs 2>/dev/null || true)" ]; then
            echo "::error::No CV variants found. Expected directories under cvs/."
            exit 1
          fi

          entries=()
          for dir in cvs/*/; do
            [ -d "$dir" ] || continue
            dir="${dir%/}"
            name="$(basename "$dir")"

            # Find exactly one *.tex with \documentclass in the directory.
            mapfile -t tex_files < <(grep -l '^\s*\\documentclass' "$dir"/*.tex 2>/dev/null || true)
            if [ "${#tex_files[@]}" -eq 0 ]; then
              echo "::error::$dir contains no main .tex (file with \\documentclass)."
              exit 1
            fi
            if [ "${#tex_files[@]}" -gt 1 ]; then
              echo "::error::$dir contains multiple main .tex files: ${tex_files[*]}"
              exit 1
            fi
            tex="${tex_files[0]}"
            main="$(basename "$tex" .tex)"

            # Resolve engine from sibling .engine dotfile (default latexmk).
            engine_file="$dir/.engine"
            if [ -f "$engine_file" ]; then
              engine="$(tr -d '[:space:]' < "$engine_file")"
            else
              engine="latexmk"
            fi
            case "$engine" in
              latexmk|pdflatex|xelatex|latex-chain) ;;
              *) echo "::error::Unknown engine '$engine' in $engine_file"; exit 1 ;;
            esac

            # Auxiliary-tool detection, scoped to the variant's main .tex.
            has_bib="false"
            has_biblatex="false"
            has_index="false"
            has_glossaries="false"
            has_psfrag="false"
            if grep -Eq '\\bibliography\{' "$tex"; then has_bib="true"; fi
            if grep -Eq '\\usepackage(\[[^]]*\])?\{biblatex\}' "$tex"; then has_biblatex="true"; fi
            if grep -Eq '\\makeindex|\\printindex|\\usepackage(\[[^]]*\])?\{makeidx\}|\\usepackage(\[[^]]*\])?\{imakeidx\}' "$tex"; then has_index="true"; fi
            if grep -Eq '\\usepackage(\[[^]]*\])?\{glossaries\}|\\makeglossaries' "$tex"; then has_glossaries="true"; fi
            if grep -Eq '\\usepackage(\[[^]]*\])?\{psfrag\}|\\psfrag\{' "$tex"; then has_psfrag="true"; fi

            entry=$(printf '{"name":"%s","dir":"%s","main":"%s","engine":"%s","has_bib":"%s","has_biblatex":"%s","has_index":"%s","has_glossaries":"%s","has_psfrag":"%s"}' \
              "$name" "$dir" "$main" "$engine" "$has_bib" "$has_biblatex" "$has_index" "$has_glossaries" "$has_psfrag")
            entries+=("$entry")

            echo "  - $name  dir=$dir  main=$main.tex  engine=$engine"
          done

          if [ "${#entries[@]}" -eq 0 ]; then
            echo "::error::No CV variants discovered under cvs/."
            exit 1
          fi

          # Build "{\"include\":[ ... ]}" JSON.
          joined="$(IFS=,; echo "${entries[*]}")"
          matrix_json="{\"include\":[${joined}]}"
          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"
          echo "Discovered ${#entries[@]} CV variant(s)."
          echo "matrix=$matrix_json"

  # =====================================================================
  #  build
  #
  #  Matrix build, one leg per discovered CV variant. The engine, main
  #  filename, working directory, and aux-tool flags are all driven by
  #  the matrix entry produced by `discover`. TEXINPUTS lets each main
  #  resolve repo-root shared assets (personal-info.tex, *.sty, images/)
  #  without any path edits inside the .tex source.
  # =====================================================================
  build:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: texlive/texlive:latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.dir }}
    env:
      # Append repo root and images/ to kpathsea search so
      # \input{personal-info}, \usepackage{cv-sidebar}, and
      # \includegraphics{images/...} resolve from inside cvs/<name>/.
      TEXINPUTS: ".:../..:../../images:"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build with latexmk
        if: matrix.engine == 'latexmk'
        run: |
          set -euo pipefail
          latexmk -pdf \
                  -interaction=nonstopmode -halt-on-error -file-line-error \
                  -g "${{ matrix.main }}.tex"

      - name: Build with pdflatex, latex-chain, or xelatex
        if: matrix.engine == 'pdflatex' || matrix.engine == 'latex-chain' || matrix.engine == 'xelatex'
        env:
          ENGINE: ${{ matrix.engine }}
          MAIN: ${{ matrix.main }}
          HAS_BIB: ${{ matrix.has_bib }}
          HAS_BIBLATEX: ${{ matrix.has_biblatex }}
          HAS_INDEX: ${{ matrix.has_index }}
          HAS_GLOSSARIES: ${{ matrix.has_glossaries }}
          HAS_PSFRAG: ${{ matrix.has_psfrag }}
        run: |
          set -euo pipefail

          case "$ENGINE" in
            pdflatex)
              LATEX_CMD="pdflatex"
              if [ "$HAS_PSFRAG" = "true" ]; then
                echo "::error::psfrag detected. pdflatex cannot perform psfrag substitutions."
                echo "::error::psfrag requires the classic latex -> dvips -> ps2pdf chain;"
                echo "::error::set .engine to 'latex-chain' for this variant."
                exit 1
              fi
              ;;
            latex-chain)
              LATEX_CMD="latex"
              if [ "$HAS_BIBLATEX" = "true" ]; then
                echo "::warning::biblatex detected; using biber. Ensure backend=biber in your preamble."
              fi
              ;;
            xelatex)
              LATEX_CMD="xelatex"
              if [ "$HAS_PSFRAG" = "true" ]; then
                echo "::error::psfrag detected. xelatex does not support psfrag substitutions."
                echo "::error::psfrag requires the classic latex -> dvips -> ps2pdf chain;"
                echo "::error::set .engine to 'latex-chain' for this variant."
                exit 1
              fi
              ;;
          esac

          # Pass 1.
          "$LATEX_CMD" -interaction=nonstopmode -halt-on-error "$MAIN.tex"

          # Bibliography: tolerate "no citations" warnings (exit 1) but
          # fail on real errors (>=2).
          if [ "$HAS_BIBLATEX" = "true" ]; then
            biber "$MAIN" || { rc=$?; [ "$rc" -ge 2 ] && exit "$rc"; }
          elif [ "$HAS_BIB" = "true" ]; then
            bibtex "$MAIN" || { rc=$?; [ "$rc" -ge 2 ] && exit "$rc"; }
          fi

          # Index.
          if [ "$HAS_INDEX" = "true" ] && [ -f "$MAIN.idx" ]; then
            makeindex "$MAIN.idx"
          fi

          # Glossaries: tolerate missing glossary files but surface real failures.
          if [ "$HAS_GLOSSARIES" = "true" ]; then
            makeglossaries "$MAIN" || { rc=$?; [ "$rc" -ge 2 ] && exit "$rc"; }
          fi

          # Pass 2 + 3 to resolve refs / TOC / index / bibliography.
          "$LATEX_CMD" -interaction=nonstopmode -halt-on-error "$MAIN.tex"
          "$LATEX_CMD" -interaction=nonstopmode -halt-on-error "$MAIN.tex"

          # latex-chain only: convert DVI -> PS (where psfrag substitutions
          # are performed) -> PDF.
          if [ "$ENGINE" = "latex-chain" ]; then
            dvips -Ppdf -G0 -o "$MAIN.ps" "$MAIN.dvi"
            ps2pdf -dPDFSETTINGS=/prepress "$MAIN.ps" "$MAIN.pdf"
            if [ "$HAS_PSFRAG" = "true" ]; then
              echo "psfrag substitutions were processed by dvips."
            fi
          fi

      - name: Verify PDF
        env:
          MAIN: ${{ matrix.main }}
        run: |
          set -euo pipefail
          if [ ! -s "$MAIN.pdf" ]; then
            echo "::error::Expected ${{ matrix.dir }}/$MAIN.pdf was not produced or is empty."
            exit 1
          fi
          ls -la "$MAIN.pdf"

      - name: Upload PDF artifact
        if: needs.discover.outputs.local != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_PREFIX }}-${{ matrix.name }}-pdf
          path: ${{ matrix.dir }}/${{ matrix.main }}.pdf
          if-no-files-found: error

      - name: Upload build logs on failure
        if: failure() && needs.discover.outputs.local != 'true'
        uses: ./.github/actions/upload-build-logs
        with:
          artifact-name: ${{ env.ARTIFACT_PREFIX }}-${{ matrix.name }}-logs
          paths: |
            ${{ matrix.dir }}/*.log
            ${{ matrix.dir }}/*.blg
            ${{ matrix.dir }}/*.ilg

  # =====================================================================
  #  package
  #
  #  Collects every per-CV PDF artifact (<repo>-<name>-pdf) into a
  #  single combined artifact named after the repo. Each PDF is placed
  #  in its own subfolder (the artifact name) to avoid collisions.
  # =====================================================================
  package:
    needs: [discover, build]
    if: needs.discover.outputs.local != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all per-CV PDF artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: ${{ env.ARTIFACT_PREFIX }}-*-pdf
          path: ./dist

      - name: List combined artifact contents
        shell: bash
        run: |
          set -euo pipefail
          find ./dist -type f -print

      - name: Upload combined artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_PREFIX }}
          path: ./dist/*
          if-no-files-found: error
