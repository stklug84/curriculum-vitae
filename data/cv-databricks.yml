      en: Schwieberdingen, Germany
    kind: work
    monogram: RB
    bg: /assets/img/cv/bg/topology.svg
    summary:
      de: >-
        Einführung moderner Datenmodellierung und Data-Mesh-Methodik zur
        Ermöglichung datengetriebener Entscheidungen; Bereitstellung hochwertiger
        kuratierter Datenprodukte und einheitlicher digitaler Komponenten-CVs
        über den gesamten ECU-Produktentwicklungszyklus. Leitung und fachliche
        Beratung eines globalen, interdisziplinären Teams von 〈N — confirm〉
        Datenmodellierungs-Experten und Data Engineers zum Aufbau eines
        einheitlichen Datenmodells — von physischen Quellen bis zur
        Ziel-Business-Schicht.
      en: >-
        Introduced modern data modelling and data-mesh methodology to enable
        data-driven decision-making, delivering high-fidelity curated data
        products and unified digital component CVs across the complete ECU
        product-development lifecycle. Led and advised a global, interdisciplinary
        team of 〈N — confirm〉 data-modelling domain experts and data engineers to
        build a unified data model — from physical sources up to the target
        business layer.
    tags: [Azure Infrastructure, RDF/OWL Ontologies, Spark, Stardog, Unity Catalog]
    bullets:
      # Design2Line2Cost
      - de: >-
          Entwurf eines Datenprodukts auf Basis graphbasierter semantischer
          Technologien und einer föderierten Datenschicht, die die gesamte Kette
          von Anforderungen über das Design bis zu den Fertigungskapazitäten
          abbildet und ein Matching von Designs zu bestehenden Shop-Floor-Layouts
          zur Kostenoptimierung des ECU-Produktportfolios ermöglicht. Senkung der
          Barriere zwischen Entwicklung, Fertigung und Logistik — Reduktion der
          Vorlauf- und Entwicklungszeit für neue Designverbesserungen um
          〈−XX% / −XX Wochen — confirm〉.
        en: >-
          Designed a data product built on graph-based semantic technologies and
          a federated data layer spanning the full chain from requirements
          through design to manufacturing capabilities, enabling
          design-to-shop-floor matching for cost optimisation across the ECU
          product portfolio. Lowered the barrier between engineering,
          manufacturing and logistics — reducing lead and development time for
          new design improvements by 〈−XX% / −XX weeks — confirm〉.
      # Architect
      - de: >-
          Entwicklung von „Architect“, einem Werkzeug, das eine einheitliche
          Ontologie nutzt, um schnelle Machbarkeitsprüfungen neuer Designs durch
          Referenzierung bestehender digitaler Produkt-CVs durchzuführen;
          Databricks Delta in Kombination mit LakeFS sorgt für vollständige
          Daten-Nachverfolgbarkeit und Baselining und verkürzt die Durchlaufzeit
          der Machbarkeitsprüfung um 〈−XX% — confirm〉.
        en: >-
          Built "Architect," a tool that applies a unified ontology to run rapid
          feasibility checks on new designs by referencing existing product
          digital CVs; Databricks Delta combined with LakeFS provides full data
          traceability and baselining, cutting feasibility-check turnaround by
          〈−XX% — confirm〉.


  - id: bosch-mfg-data
    targets: [latex, web]
    period:
      de: 01/2018 --- 01/2022
      en: 01/2018 --- 01/2022
    year: 2018
    role:
      de: Data & ML Engineer
      en: Data & ML Engineer
    org: Robert Bosch GmbH, Automotive Electronics
    location:
      de: Reutlingen
      en: Reutlingen, Germany
    kind: work
    monogram: RB
    bg: /assets/img/cv/bg/topology.svg
    summary:
      de: >-
        Aufbau und Produktivsetzung von Machine-Learning-Systemen für die
        Fertigung — von Datenpipelines über Modelltraining, Deployment und
        Monitoring — mit Verantwortung für den gesamten MLOps-Lebenszyklus auf
        Edge und Cloud zur Qualitätssteigerung und Kostensenkung in der
        Produktionslinie.
      en: >-
        Built and productionised machine-learning systems for manufacturing —
        from data pipelines through model training, deployment and monitoring —
        owning the full MLOps lifecycle on edge and cloud to improve quality and
        reduce cost on the production line.
    tags: [Azure, Kubernetes, Knowledge Graphs, Analytics]
    bullets:
      - de: >-
          Entwicklung moderner KI-Systeme unter Einbeziehung semantischer
          Daten (explainable/interpretable AI und Knowledge Graphs).
        en: >-
          Designed and delivered modern AI systems incorporating semantic
          data (explainable/interpretable AI and knowledge graphs).
      # RCAS
      - de: >-
          Entwicklung von RCAS, einem Root-Cause-Recommender, der Fehler im Pin-
          und Steckverbinder-Einpressprozess vorhersagt, indem er
          charakteristische Muster in Messdaten erkennt und mit bekannten
          8D-Reports abgleicht — Identifikation von Grundursachen
          〈XX% schneller / mit XX% Genauigkeit — confirm〉.
        en: >-
          Developed RCAS, a root-cause recommender that predicts failures in the
          pin-and-connector press-in process by detecting distinctive patterns in
          measurement data and cross-checking against known 8D reports —
          surfacing root causes 〈XX% faster / with XX% accuracy — confirm〉.
      # AI@AOI
      - de: >-
          Aufbau eines Deep-Learning-Systems zur Unterstützung der
          automatisierten optischen Inspektion (AOI) von Lötstellen, das als
          Pseudofehler markierte Bilder bewertet und den potenziellen Fehlertyp
          kategorisiert — Reduktion der manuell zu prüfenden Bilder um den Faktor
          10 bei besserer Leistung als menschliche Prüfer und geringerer
          Ermüdung. Ausgeliefert auf einem Edge-Gerät in der Produktionslinie
          (MES-gesteuert) mit Shadow-Mode-Deployment, Model-Drift-Erkennung und
          automatischen Retraining-Triggern für neue Bauteile/Fehlertypen.
        en: >-
          Built a deep-learning system supporting automated optical inspection
          (AOI) of solder joints, scoring images flagged as pseudo-failures and
          categorising the potential failure type — reducing manually reviewed
          images by a factor of 10 and outperforming human operators while
          cutting operator fatigue. Shipped to an edge device on the production
          line (MES-controlled) with shadow-mode deployment, model-drift
          detection and automated retraining triggers for new packages/failure
          types.
      # Logistics Forecasting
      - de: >-
          Aufbau eines Bedarfsprognosesystems zur Vorhersage von
          Kundenbestellmengen über mehrere Zeithorizonte (1-, 3- und
          12-Monats-Fenster) sowie zur Modellierung der systematischen
          Prognoseverzerrung je Kunde — empirisches Lernen, wo Kunden ihren
          künftigen Bedarf über- oder unterschätzen — um Produktionsvolumina
          genauer zu planen und Materialbestellungen bei Lieferanten optimal
          auszusteuern, bei niedrigen Beständen und einer um 〈+XX% — confirm〉
          verbesserten Bedarfsprognosegenauigkeit sowie 〈um XX% — confirm〉
          reduzierten Beständen.
        en: >-
          Built a demand-forecasting system predicting customer order volumes
          across multiple horizons (1-, 3- and 12-month windows) and modelling
          each customer's systematic forecast bias — learning empirically where
          customers over- or under-estimate future demand — to plan production
          volumes more accurately and optimise supplier material orders, keeping
          inventories low while improving demand-forecast accuracy by
          〈+XX% — confirm〉 and reducing inventory 〈by XX% — confirm〉.


