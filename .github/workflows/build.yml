name: Build Document

on:
  pull_request:
  workflow_dispatch:
    inputs:
      engine:
        description: "LaTeX toolchain to use"
        required: true
        default: "latexmk"
        type: choice
        options:
          - latexmk
          - pdflatex
          - latex-chain
      local:
        description: "Set to 'true' when running locally via gh act (skips artifact upload, writes outputs to ./out)"
        required: false
        default: "false"
        type: string
      main_tex:
        description: "Main document basename without .tex (leave blank to auto-detect)"
        required: false
        default: ""
        type: string

# Least-privilege token: this workflow only reads the repo and uploads artifacts.
permissions:
  contents: read

# Cancel outdated runs on the same ref.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Default engine when not triggered via workflow_dispatch.
  DEFAULT_ENGINE: latexmk

jobs:
  # =====================================================================
  #  detect
  #
  #  Resolves workflow inputs (engine, local-mode flag, main document
  #  basename) and scans the main .tex for auxiliary toolchain
  #  requirements (bibtex/biblatex, makeindex, glossaries, psfrag).
  #  All downstream jobs consume these as `needs.detect.outputs.*` so the
  #  detection logic lives in exactly one place.
  # =====================================================================
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      main:           ${{ steps.main.outputs.main }}
      local:          ${{ steps.cfg.outputs.local }}
      engine:         ${{ steps.cfg.outputs.engine }}
      has_bib:        ${{ steps.aux.outputs.has_bib }}
      has_biblatex:   ${{ steps.aux.outputs.has_biblatex }}
      has_index:      ${{ steps.aux.outputs.has_index }}
      has_glossaries: ${{ steps.aux.outputs.has_glossaries }}
      has_psfrag:     ${{ steps.aux.outputs.has_psfrag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve inputs
        id: cfg
        shell: bash
        env:
          # `inputs.*` is the canonical accessor for workflow_dispatch.
          # On non-dispatch events these are empty strings and we fall
          # back to env defaults / the ACT auto-detect below.
          ENGINE_IN: ${{ inputs.engine }}
          LOCAL_IN: ${{ inputs.local }}
        run: |
          set -euo pipefail
          ENGINE="${ENGINE_IN:-$DEFAULT_ENGINE}"
          # nektos/act exports ACT=true; treat that as implicit local mode.
          LOCAL="${LOCAL_IN:-${ACT:+true}}"
          LOCAL="${LOCAL:-false}"
          echo "engine=$ENGINE" >> "$GITHUB_OUTPUT"
          echo "local=$LOCAL"   >> "$GITHUB_OUTPUT"
          echo "Resolved engine=$ENGINE local=$LOCAL (ACT=${ACT:-unset})"

      - name: Detect main LaTeX document
        id: main
        shell: bash
        env:
          MAIN_IN: ${{ inputs.main_tex }}
        run: |
          set -euo pipefail
          MAIN="${MAIN_IN:-}"
          if [ -z "$MAIN" ]; then
            # Auto-detect: pick the first repo-root .tex with \documentclass.
            MAIN_FILE="$(grep -l '^\s*\\documentclass' ./*.tex 2>/dev/null | head -n1 || true)"
            if [ -z "$MAIN_FILE" ]; then
              echo "::error::No main .tex file (containing \\documentclass) found in repo root."
              exit 1
            fi
            MAIN="$(basename "$MAIN_FILE" .tex)"
          fi
          echo "main=$MAIN" >> "$GITHUB_OUTPUT"
          echo "Main document: ${MAIN}.tex"

      - name: Detect auxiliary inputs (bib / idx / glossaries / psfrag)
        id: aux
        shell: bash
        env:
          MAIN: ${{ steps.main.outputs.main }}
        run: |
          set -euo pipefail
          TEX="${MAIN}.tex"

          HAS_BIB="false"
          HAS_BIBLATEX="false"
          HAS_INDEX="false"
          HAS_GLOSSARIES="false"
          HAS_PSFRAG="false"

          # Bibliography: BibTeX (\bibliography{...}) vs biblatex/biber.
          if grep -Eq '\\bibliography\{' "$TEX"; then
            HAS_BIB="true"
          fi
          if grep -Eq '\\usepackage(\[[^]]*\])?\{biblatex\}' "$TEX"; then
            HAS_BIBLATEX="true"
          fi

          # Index (makeindex).
          if grep -Eq '\\makeindex|\\printindex|\\usepackage(\[[^]]*\])?\{makeidx\}|\\usepackage(\[[^]]*\])?\{imakeidx\}' "$TEX"; then
            HAS_INDEX="true"
          fi

          # Glossaries (makeglossaries).
          if grep -Eq '\\usepackage(\[[^]]*\])?\{glossaries\}|\\makeglossaries' "$TEX"; then
            HAS_GLOSSARIES="true"
          fi

          # psfrag: only relevant for the latex->dvips->ps2pdf chain.
          if grep -Eq '\\usepackage(\[[^]]*\])?\{psfrag\}|\\psfrag\{' "$TEX"; then
            HAS_PSFRAG="true"
          fi

          {
            echo "has_bib=$HAS_BIB"
            echo "has_biblatex=$HAS_BIBLATEX"
            echo "has_index=$HAS_INDEX"
            echo "has_glossaries=$HAS_GLOSSARIES"
            echo "has_psfrag=$HAS_PSFRAG"
          } >> "$GITHUB_OUTPUT"

          echo "Detected:"
          echo "  bibtex     : $HAS_BIB"
          echo "  biblatex   : $HAS_BIBLATEX"
          echo "  index      : $HAS_INDEX"
          echo "  glossaries : $HAS_GLOSSARIES"
          echo "  psfrag     : $HAS_PSFRAG"

  # =====================================================================
  #  build
  #
  #  Compiles the print-ready PDF using the engine selected by `detect`.
  #  The default engine (`latexmk`) is driven by latexmkrc; the other
  #  two are kept as escape hatches for users who reintroduce psfrag or
  #  prefer the plain pdfLaTeX three-pass workflow.
  # =====================================================================
  build:
    needs: detect
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: texlive/texlive:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # latexmk drives pdflatex per latexmkrc (which registers the
      # glossaries cus_dep). The map is included via \includegraphics,
      # so no shell-escape is needed.
      - name: Build with latexmk
        if: needs.detect.outputs.engine == 'latexmk'
        shell: bash
        env:
          MAIN: ${{ needs.detect.outputs.main }}
        run: |
          set -euo pipefail
          latexmk -pdf \
                  -interaction=nonstopmode -halt-on-error -file-line-error \
                  -g "$MAIN.tex"

      # The pdflatex and latex-chain engines share their bibliography,
      # index, and glossaries handling. The compiler binary (pdflatex
      # produces PDF directly; latex produces DVI) and post-processing
      # (dvips + ps2pdf when DVI) are the only per-engine differences.
      - name: Build with pdflatex or latex-chain
        if: needs.detect.outputs.engine == 'pdflatex' || needs.detect.outputs.engine == 'latex-chain'
        shell: bash
        env:
          ENGINE: ${{ needs.detect.outputs.engine }}
          MAIN: ${{ needs.detect.outputs.main }}
          HAS_BIB: ${{ needs.detect.outputs.has_bib }}
          HAS_BIBLATEX: ${{ needs.detect.outputs.has_biblatex }}
          HAS_INDEX: ${{ needs.detect.outputs.has_index }}
          HAS_GLOSSARIES: ${{ needs.detect.outputs.has_glossaries }}
          HAS_PSFRAG: ${{ needs.detect.outputs.has_psfrag }}
        run: |
          set -euo pipefail

          case "$ENGINE" in
            pdflatex)
              LATEX_CMD="pdflatex"
              if [ "$HAS_PSFRAG" = "true" ]; then
                echo "::error::psfrag detected. pdflatex cannot perform psfrag substitutions."
                echo "::error::psfrag requires the classic latex -> dvips -> ps2pdf chain;"
                echo "::error::re-run the workflow with engine=latex-chain."
                exit 1
              fi
              ;;
            latex-chain)
              LATEX_CMD="latex"
              if [ "$HAS_BIBLATEX" = "true" ]; then
                echo "::warning::biblatex detected; using biber. Ensure backend=biber in your preamble."
              fi
              ;;
          esac

          # Pass 1.
          "$LATEX_CMD" -interaction=nonstopmode -halt-on-error "$MAIN.tex"

          # Bibliography: tolerate "no citations" warnings (exit 1) but
          # fail on real errors (>=2).
          if [ "$HAS_BIBLATEX" = "true" ]; then
            biber "$MAIN" || { rc=$?; [ "$rc" -ge 2 ] && exit "$rc"; }
          elif [ "$HAS_BIB" = "true" ]; then
            bibtex "$MAIN" || { rc=$?; [ "$rc" -ge 2 ] && exit "$rc"; }
          fi

          # Index.
          if [ "$HAS_INDEX" = "true" ] && [ -f "$MAIN.idx" ]; then
            makeindex "$MAIN.idx"
          fi

          # Glossaries: tolerate missing glossary files but surface real failures.
          if [ "$HAS_GLOSSARIES" = "true" ]; then
            makeglossaries "$MAIN" || { rc=$?; [ "$rc" -ge 2 ] && exit "$rc"; }
          fi

          # Pass 2 + 3 to resolve refs / TOC / index / bibliography.
          "$LATEX_CMD" -interaction=nonstopmode -halt-on-error "$MAIN.tex"
          "$LATEX_CMD" -interaction=nonstopmode -halt-on-error "$MAIN.tex"

          # latex-chain only: convert DVI -> PS (where psfrag substitutions
          # are performed) -> PDF.
          if [ "$ENGINE" = "latex-chain" ]; then
            dvips -Ppdf -G0 -o "$MAIN.ps" "$MAIN.dvi"
            ps2pdf -dPDFSETTINGS=/prepress "$MAIN.ps" "$MAIN.pdf"
            if [ "$HAS_PSFRAG" = "true" ]; then
              echo "psfrag substitutions were processed by dvips."
            fi
          fi

      - name: Verify PDF
        shell: bash
        env:
          MAIN: ${{ needs.detect.outputs.main }}
        run: |
          set -euo pipefail
          if [ ! -s "$MAIN.pdf" ]; then
            echo "::error::Expected $MAIN.pdf was not produced or is empty."
            exit 1
          fi
          ls -la "$MAIN.pdf"

      # Intermediate PDF artifact; repackaged into the final
      # `book` artifact by the package job.
      - name: Upload PDF artifact
        if: needs.detect.outputs.local != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: book-pdf-intermediate
          path: ${{ needs.detect.outputs.main }}.pdf
          if-no-files-found: error

      - name: Upload build logs on failure
        if: failure() && needs.detect.outputs.local != 'true'
        uses: ./.github/actions/upload-build-logs
        with:
          artifact-name: build-logs
          paths: |
            *.log
            *.blg
            *.ilg


  # =====================================================================
  #  package
  #
  #  Wraps the PDF (from `build`) into the user-facing `book` artifact.
  #  This is the artifact a downstream consumer should fetch.
  # =====================================================================
  package:
    needs: [detect, build]
    if: needs.detect.outputs.local != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download PDF artifact
        uses: actions/download-artifact@v6
        with:
          name: book-pdf-intermediate
          path: ./dist

      - name: List combined artifact contents
        shell: bash
        run: ls -la ./dist

      - name: Upload combined artifact (book)
        uses: actions/upload-artifact@v7
        with:
          name: book
          path: ./dist/*
          if-no-files-found: error
