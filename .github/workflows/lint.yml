---
# title: Lint workflow
# authors:
#   - Steffen Klug <45033201+stklug84@users.noreply.github.com>
# date: 2026-06-11
# keywords: [infrastructure, linting]
# comment: |
#   Lints the repository on pull requests against main:
#     - actionlint   : .github/workflows/* (incl. shellcheck on run: steps)
#     - yamllint     : all YAML files (.yamllint.yml)
#     - markdownlint : all Markdown files (.markdownlint.yml)
#     - hadolint     : .github/docker/texlive/Dockerfile
#     - cv-schema    : validate each data/cv-*.yml against cv/parse schema
# ---
name: Lint

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint (workflows)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download actionlint
        id: get-actionlint
        env:
          ACTIONLINT_VERSION: 1.7.10
        run: |
          set -euo pipefail
          BASE="https://raw.githubusercontent.com/rhysd/actionlint"
          bash <(curl -fsSL "$BASE/v${ACTIONLINT_VERSION}/scripts/download-actionlint.bash") \
            "$ACTIONLINT_VERSION"

      - name: Run actionlint
        run: |
          set -euo pipefail
          ./actionlint -color

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install yamllint
        run: |
          set -euo pipefail
          pip install --user yamllint

      - name: Run yamllint
        run: |
          set -euo pipefail
          yamllint --strict .

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd  # v23.2.0
        with:
          config: .markdownlint.yml
          globs: '**/*.md'

  hadolint:
    name: hadolint (Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: .github/docker/texlive/Dockerfile

  # Discover every CV data source present in the checkout. The matrix is
  # built at runtime from data/cv-*.yml rather than hardcoded, so:
  #   - the remote (which may carry no committed CV data) lints just what
  #     exists and never fails on a missing source, and
  #   - a local checkout that also has gitignored sources (e.g.
  #     data/cv-academics.yml) lints them too, with no workflow edit.
  discover-sources:
    name: discover cv sources
    runs-on: ubuntu-latest
    outputs:
      sources: ${{ steps.find.outputs.sources }}
      has_sources: ${{ steps.find.outputs.has_sources }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Find data/cv-*.yml
        id: find
        run: |
          set -euo pipefail
          # Emit a JSON array of every CV source feeding the variant
          # matrix. Sorted for deterministic matrix ordering. When none
          # exist (e.g. all sources are gitignored/local-only), skip the
          # schema matrix instead of failing.
          sources="$(find data -maxdepth 1 -type f -name 'cv-*.yml' \
            | sort | jq -R . | jq -cs .)"
          echo "Discovered CV sources: ${sources}"
          if [ "${sources}" = "[]" ]; then
            echo "has_sources=false" >> "${GITHUB_OUTPUT}"
          else
            echo "has_sources=true" >> "${GITHUB_OUTPUT}"
          fi
          echo "sources=${sources}" >> "${GITHUB_OUTPUT}"

  cv-schema:
    name: cv-schema (${{ matrix.source }})
    needs: discover-sources
    if: needs.discover-sources.outputs.has_sources == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Discovered at runtime by discover-sources; every data/cv-*.yml
        # source must satisfy the cv/parse schema contract.
        source: ${{ fromJSON(needs.discover-sources.outputs.sources) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Validate the source of truth against the cv/parse schema
      # contract; --check writes nothing and fails the PR on the first
      # violation with a clear message. Pinned to actions v2.11.0 so the
      # check enforces the structured certifications schema (code/name/issuer)
      # and accepts the optional meta.pdf_title.
      - name: Validate ${{ matrix.source }}
        uses: stklug84/actions/cv/parse@65656caff28ec2a4d66b5bb98151cc8f55e51414  # v2.11.0
        with:
          source: ${{ matrix.source }}
          check: "true"
          # out-dir is required by the action but unused in --check mode.
          out-dir: .
